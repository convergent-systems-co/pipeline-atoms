name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to apply (dev/stg/prod)"
        required: true
        default: "dev"
        type: choice
        options: [dev, stg, prod]
      confirm:
        description: "Type 'apply' to confirm"
        required: true

permissions:
  contents: read

env:
  TF_VERSION: "1.10.0"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  apply:
    if: github.event.inputs.confirm == 'apply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: tofu init
        run: tofu -chdir=infra/terraform/envs/${{ github.event.inputs.env }} init -input=false

      - name: tofu plan
        run: tofu -chdir=infra/terraform/envs/${{ github.event.inputs.env }} plan -input=false -out=tfplan

      - name: tofu apply
        run: tofu -chdir=infra/terraform/envs/${{ github.event.inputs.env }} apply -input=false tfplan
